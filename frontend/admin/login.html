<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<title>Admin Login</title>

<link rel="stylesheet"
href="../css/admin.css">

</head>

<body>

<div class="login-container">

    <h1>DesignMe Admin</h1>

    <form id="loginForm">

        <input
        type="email"
        id="email"
        placeholder="Correo">

        <input
        type="password"
        id="password"
        placeholder="Contraseña">

        <button>

            Ingresar

        </button>

    </form>

</div>

<script src="../js/login.js"></script>
<script src="../js/auth.js"></script>

</body>

</html>
